<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preston Autocare Ltd</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>

    <header class="site-header">
        <div class="header-container">
            <div class="logo">
                <img src="images/logo.png" alt="Preston Autocare">
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>Welcome to Preston Autocare Ltd</h1>
            <p class="hero-subtext">We are a small family run garage serving Wrose & surrounding areas.</p>
            <a href="tel:01274966496" class="btn-primary hero-phone-btn">
                <span class="phone-icon-red">📞</span> 01274 966496
            </a>
        </div>
    </section>

    <!-- Reviews Section -->
    <section id="reviews" class="reviews-section" style="padding: 40px 20px; text-align: center;">
        <h2>What our customers say</h2>
        <!-- Elfsight Google Reviews -->
        <script src="https://elfsightcdn.com/platform.js" async></script>
        <div class="elfsight-app-08f56f54-3ddc-4a04-b964-5ed05c0e384d"></div>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
        <!-- Footer content remains the same -->
    </footer>

    <script>
    function redirectToMOT(event) {
        event.preventDefault();
        var reg = document.getElementById('reg-input').value.replace(/\s+/g, '').toLowerCase();
        var url = 'https://www.check-mot.service.gov.uk/results?registration=' + encodeURIComponent(reg) + '&checkRecalls=true';
        window.open(url, '_blank');
    }
    </script>
</body>
</html>
